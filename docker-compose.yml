services:

  # ── 1. PostgreSQL database ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: oms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data   # named volume → data persists across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── 2. FastAPI backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oms-backend
    restart: unless-stopped
    environment:
      # start.sh and SQLAlchemy both read DATABASE_URL
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-*}
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD:-10}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
    depends_on:
      db:
        condition: service_healthy   # wait for pg_isready before starting
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── 3. React frontend (nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL is baked into the JS bundle at build time.
        # In production override this to your deployed backend URL.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: oms-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy   # wait for API to be ready before accepting traffic
    ports:
      - "5173:80"

# Named volume so Postgres data survives container restarts / recreations
volumes:
  pgdata:
