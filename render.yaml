# Render Blueprint: deploys the backend as a Docker web service + free Postgres.
# Create from the Render dashboard: New > Blueprint > point at this repo.
services:
  - type: web
    name: oms-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oms-db
          property: connectionString
      # Set this to your deployed frontend origin after Vercel is live, e.g.
      # https://your-frontend.vercel.app
      - key: FRONTEND_ORIGIN
        sync: false
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: SEED_ON_STARTUP
        value: "true"

databases:
  - name: oms-db
    plan: free
    databaseName: oms
    user: oms
